<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="score">
            <span class="player1">
                <p class="player">player1</p>
                <p class="scores" id="score1">0</p>
            </span>
            <p class="vs">VS</p>
            <span class="player2">
                <p class="player">player2</p>
                <p class="scores" id="score2">0</p>
            </span>
        </div>
        <p id="message">Click "New Game" to start!</p>
        <div class="tic-tac">
            <div class="box" data-index="o"></div>
            <div class="box" data-index="o"></div>
            <div class="box" id="3"></div>
            <div class="box" id="4"></div>
            <div class="box" id="5"></div>
            <div class="box" id="6"></div>
            <div class="box" id="7"></div>
            <div class="box" id="8"></div>
            <div class="box" id="9"></div>
        </div>
        <div class="buttons">
            <button class="button1" onclick="newGame()">NEW GAME</button>
            <button class="button2" disabled>NEW ROUND</button>
            <button class="button3" onclick="restartGame()">RESTART</button>
        </div>
    </div>
</body>
</html>
