<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tic-tac-toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="score">
            <span class="player1">
                <p class="player">player1</p>
                <p class="scores">0</p>
            </span>
            <p class="vs">VS</p>
            <span class="player1">
                <p class="player">player2</p>
                <p class="scores">0</p>
            </span>
        </div>
        <p class="message">Click "New Game" to start!</p>
    </div>
</body>
</html>
